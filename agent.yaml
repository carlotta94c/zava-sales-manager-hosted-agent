# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: zava-sales-manager-hosted-agent
description: >
  An internal assistant for Zava, a DIY retailer. You assist store managers and head office staff by analyzing sales data and managing inventory.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Sales Management
    - Inventory Management
protocols:
  - protocol: responses
    version: v1
tools:
    - type: file_search
      vector_store_ids:
        - vs_3tzkgfpKfOgAO5LkHtD4cPJt
environment_variables:
  - name: PROJECT_ENDPOINT
    value: "{{PROJECT_ENDPOINT}}"
  - name: MODEL_DEPLOYMENT_NAME
    value: "{{MODEL_DEPLOYMENT_NAME}}"